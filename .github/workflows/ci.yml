# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: madbfs CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure C++ Development Tools
      run: |
        sudo apt update -y
        sudo apt install build-essential cmake ninja-build git -y

    - name: Configure Conan 2 Package Manager
      run: |
        sudo apt install python3 python3-pip -y
        pip3 install conan
        conan profile detect --force

    - name: Configure Android NDK
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r29-beta1-linux.zip
        unzip android-ndk-r29-beta1-linux

    - name: Build, Test, and Package
      run: ./package.sh
      env:
        ANDROID_NDK_HOME: android-ndk-r29-beta1-linux

